# Wrangler configuration for Cloudflare R2 Worker
# This worker provides server-side R2 operations to avoid exposing credentials in the browser

name = "architex-r2-api"
main = "api/r2-worker.ts"
compatibility_date = "2024-01-01"

# R2 Bucket binding
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "architex"

# Vercel compatibility - worker runs on separate domain or as serverless function
# For Vercel deployment, consider using Vercel Blob or a separate Cloudflare Worker deployment
